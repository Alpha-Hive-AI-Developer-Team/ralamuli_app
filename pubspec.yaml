name: ralamuli_translator
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  flutter_screenutil: ^5.9.3
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0  
  sqflite: ^2.4.2
  path: ^1.9.1
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/ralamuli-appicon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/ralamuli-appicon.png
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: assets/images/ralamuli-appicon.png
    background_color: "#FFFFFF"
    theme_color: "#6B4EFF"
  windows:
    generate: true
    image_path: assets/images/ralamuli-appicon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/images/ralamuli-appicon.png

flutter:
  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
    - assets/data/

  fonts:
  - family: Inter
    fonts:
      - asset: assets/fonts/Inter_18pt-Regular.ttf
        weight: 400
      - asset: assets/fonts/Inter_18pt-Medium.ttf
        weight: 500
      - asset: assets/fonts/Inter_18pt-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Inter_18pt-Bold.ttf
        weight: 700
      - asset: assets/fonts/Inter_18pt-ExtraBold.ttf
        weight: 800

  - family: Scada
    fonts:
      - asset: assets/fonts/Scada.ttf
        weight: 400      
